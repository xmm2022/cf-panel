# Cloudflare Workers 定时任务配置
# 将此配置添加到你的 wrangler.toml 文件中

[triggers]
# 每5分钟执行一次服务器检查
crons = ["*/5 * * * *"]

# 或者根据需要选择其他频率：
# 每分钟: "* * * * *"
# 每10分钟: "*/10 * * * *"
# 每30分钟: "*/30 * * * *"
# 每小时: "0 * * * *"

# 配置示例完整的 wrangler.toml：
# 
# name = "spider-backend"
# main = "cloudflare-worker-complete.js"
# compatibility_date = "2024-01-01"
# 
# [[d1_databases]]
# binding = "DB"
# database_name = "spider-backend"
# database_id = "your-database-id"
# 
# [triggers]
# crons = ["*/5 * * * *"]
