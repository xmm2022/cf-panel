# Wrangler 配置文件
name = "spider-backend"
main = "cloudflare-worker-complete.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "spider-backend"
database_id = "YOUR_DATABASE_ID" # 创建 D1 数据库后替换

# 环境变量（在 Cloudflare Dashboard 设置）
[vars]
# 环境变量可以在 Dashboard -> Workers -> Settings -> Variables 中设置

# 生产环境配置
[env.production]
name = "spider-backend"
route = { pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }

# 预览环境配置
[env.staging]
name = "spider-backend-staging"

# 定时任务配置 - 每5分钟执行一次服务器检查
[triggers]
crons = ["*/5 * * * *"]
